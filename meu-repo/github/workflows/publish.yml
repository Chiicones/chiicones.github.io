name: Renderiza e publica dashboard

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"   # toda segunda-feira às 09h UTC (atualização automática)
  workflow_dispatch:        # permite rodar manualmente pelo GitHub

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instala R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"

      - name: Instala pacotes R
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            httr
            jsonlite
            dplyr
            lubridate
            plotly
            DT
            htmltools

      - name: Instala Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Renderiza dashboard
        run: quarto render dashboard_bcb.qmd --output-dir docs

      - name: Publica no GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
